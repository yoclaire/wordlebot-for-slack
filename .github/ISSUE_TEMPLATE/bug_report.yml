name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Post a Wordle share like "Wordle 1,234 3/6"
        2. ...
  - type: input
    id: version
    attributes:
      label: How are you running the bot?
      placeholder: "e.g. Docker on Ubuntu 24.04, Python 3.12 directly, etc."
